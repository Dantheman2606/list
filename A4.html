<!DOCTYPE html>
<html>
<head>
    <title>College Helpdesk Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f2f5;
        }

        .chat-container {
            width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            overflow: hidden;
        }

        .chat-header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .chat-box {
            height: 400px;
            padding: 10px;
            overflow-y: auto;
            background: #fafafa;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            width: fit-content;
            max-width: 80%;
        }

        .user {
            background: #d1e7dd;
            margin-left: auto;
        }

        .bot {
            background: #e2e3e5;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        College Helpdesk Chatbot
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hello! Ask me about courses, fees, timings, or contact info.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

function sendMessage() {

    let input = document.getElementById("userInput");
    let userText = input.value.toLowerCase();

    if(userText.trim() === "") {
        return;
    }

    addMessage(userText, "user");

    let botReply = getBotResponse(userText);

    setTimeout(() => {
        addMessage(botReply, "bot");
    }, 500);

    input.value = "";
}

function addMessage(text, sender) {

    let chatBox = document.getElementById("chatBox");

    let messageDiv = document.createElement("div");

    messageDiv.classList.add("message");
    messageDiv.classList.add(sender);

    messageDiv.innerText = text;

    chatBox.appendChild(messageDiv);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function getBotResponse(input) {

    // Greeting
    if(input.includes("hello") || input.includes("hi")) {
        return "Hello! How can I help you today?";
    }

    // Courses
    else if(input.includes("course")) {
        return "We offer Computer Engineering, IT, AI & DS, and Electronics.";
    }

    // Fees
    else if(input.includes("fee")) {
        return "The annual fee is approximately ₹1,20,000.";
    }

    // Timings
    else if(input.includes("timing") || input.includes("hours")) {
        return "College timings are 9 AM to 5 PM.";
    }

    // Contact
    else if(input.includes("contact")) {
        return "You can contact us at: 9876543210";
    }

    // Admission
    else if(input.includes("admission")) {
        return "Admissions start in June every year.";
    }

    // Bye
    else if(input.includes("bye")) {
        return "Goodbye! Have a great day.";
    }

    // Default response
    else {
        return "Sorry, I did not understand that.";
    }
}

</script>

</body>
</html>
